<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return.Question 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body{
    font-family:'Noto Sans JP',sans-serif;
    background:#fff;
    color:#000;
    margin:0;
    padding:40px;
}
h1{
    font-weight:500;
}
.login{
    max-width:400px;
    margin:auto;
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #000;
}
button{
    padding:8px 12px;
    background:#000;
    color:#fff;
    border:none;
    cursor:pointer;
    margin-top:10px;
}
.question-box{
    border:1px solid #000;
    padding:15px;
    margin:15px 0;
}
.counter{
    margin:20px 0;
}
.delete-btn{
    background:#fff;
    color:#000;
    border:1px solid #000;
    margin-top:10px;
}
</style>
</head>
<body>

<div id="loginArea" class="login">
    <h1>管理ログイン</h1>
    <input type="password" id="password" placeholder="パスワード">
    <button onclick="login()">ログイン</button>
</div>

<div id="adminArea" style="display:none;">
    <h1>質問一覧</h1>
    <p class="counter">現在の質問数：<span id="counter">0 / 100</span></p>
    <div id="questions"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwYlq4Ua1Y7ELQ1sBfq_4E-PYcGvAQZR2u7hUPy_X9riTv44q1DnRKGGiYEopZMmzCGHQ/exec";
const PASSWORD = "Kdkm09020701";

function login(){
    const input = document.getElementById("password").value;
    if(input === PASSWORD){
        document.getElementById("loginArea").style.display="none";
        document.getElementById("adminArea").style.display="block";
        loadQuestions();
    }else{
        alert("パスワードが違います");
    }
}

async function loadQuestions(){
    const res = await fetch(API_URL + "?t=" + new Date().getTime());
    const data = await res.json();

    const container = document.getElementById("questions");
    const counter = document.getElementById("counter");

    container.innerHTML = "";

    const count = data.length > 0 ? data.length - 1 : 0;
    counter.textContent = count + " / 100";

    for(let i = 1; i < data.length; i++){
        const box = document.createElement("div");
        box.className = "question-box";

        box.innerHTML = `
            <strong>名前：</strong>${data[i][0] || "匿名"}<br>
            <strong>質問：</strong>${data[i][1]}<br>
            <strong>日時：</strong>${data[i][2] || ""}<br>
            <button class="delete-btn" onclick="deleteQuestion(${i+1})">削除</button>
        `;

        container.appendChild(box);
    }
}

async function deleteQuestion(row){
    if(!confirm("本当に削除しますか？")) return;

    await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "delete",
            row: row
        })
    });

    loadQuestions();
}
</script>

</body>
</html>
